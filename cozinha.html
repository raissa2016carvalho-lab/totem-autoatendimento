<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>useTotem — Cozinha</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --green:#4a7c59;--green-dark:#2b4a35;--green-mid:#6a9e7a;
      --green-light:#a8cbb5;--green-pale:#d4eadc;--green-ghost:#eef6f1;
      --white:#fafcfb;--cream:#f4f7f5;--card:#ffffff;
      --border:#dceae2;--text:#2b3d32;--text2:#5a7265;--text3:#8aaa96;
      --red:#c0574a;--amber:#d48c2a;
    }
    html,body{height:100%;background:var(--cream);color:var(--text);font-family:'DM Sans',sans-serif}
    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--green-light);border-radius:4px}

    /* LOGIN */
    .login-page{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--white)}
    .login-wrap{width:min(340px,92vw)}
    .login-logo{font-family:'Playfair Display',serif;font-weight:700;font-size:28px;color:var(--text);text-align:center;margin-bottom:4px}
    .login-logo span{color:var(--green)}
    .login-sub{font-size:13px;color:var(--text3);text-align:center;margin-bottom:28px}
    .login-box{background:var(--card);border:1.5px solid var(--border);border-radius:18px;padding:24px;box-shadow:0 6px 24px rgba(74,124,89,.1)}
    .login-box h3{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;margin-bottom:18px}
    .form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:13px}
    .form-group label{font-size:12px;color:var(--text2);font-weight:500}
    .form-group input{background:var(--green-ghost);border:1.5px solid var(--border);color:var(--text);border-radius:9px;padding:10px 12px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border .2s;width:100%}
    .form-group input:focus{border-color:var(--green-mid);background:var(--white)}
    .btn-primary{background:var(--green);color:#fff;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;width:100%}
    .btn-primary:hover{background:#3a6647}
    .login-error{font-size:12px;color:var(--red);margin-bottom:10px;display:none;padding:8px 12px;background:#faeae8;border-radius:8px}
    .login-error.show{display:block}

    /* KITCHEN */
    .kitchen-page{position:fixed;inset:0;display:none;flex-direction:column}
    .kitchen-page.active{display:flex}
    .kitchen-nav{background:var(--green-dark);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .kitchen-nav-left{display:flex;align-items:center;gap:14px}
    .kitchen-logo{font-family:'Playfair Display',serif;font-weight:700;font-size:18px;color:#fff}
    .kitchen-logo span{color:var(--green-light)}
    .kitchen-rest{font-size:13px;color:var(--green-light);font-weight:400}
    .status-dot{width:9px;height:9px;border-radius:50%;background:#2ecc71;flex-shrink:0;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .status-label{font-size:12px;color:rgba(255,255,255,.55)}
    .btn-sair{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
    .btn-sair:hover{background:rgba(255,255,255,.2);color:#fff}

    .kitchen-body{flex:1;overflow-y:auto;padding:20px 24px}
    .kitchen-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--text3)}
    .kitchen-empty-icon{font-size:56px;opacity:.3}
    .kitchen-empty p{font-size:14px;font-weight:300}

    .orders-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
    .order-card{background:var(--card);border:1.5px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:0 2px 10px rgba(74,124,89,.07);animation:slideIn .3s ease}
    @keyframes slideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .order-card.novo{border-color:var(--amber);animation:slideIn .3s ease,glow 1s ease 3}
    @keyframes glow{0%,100%{box-shadow:0 2px 10px rgba(74,124,89,.07)}50%{box-shadow:0 0 20px rgba(212,140,42,.4)}}
    .order-header{background:var(--green-dark);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
    .order-mesa{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:#fff}
    .order-time{font-size:11px;color:var(--green-light)}
    .order-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px;background:var(--amber);color:#fff}
    .order-items{padding:14px 16px}
    .order-item-row{display:flex;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2)}
    .order-item-row:last-child{border-bottom:none}
    .order-qty{font-weight:700;color:var(--green);min-width:24px}
    .order-item-name{flex:1}
    .order-footer{padding:12px 16px;border-top:1.5px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .order-total{font-size:14px;font-weight:700;color:var(--text)}
    .btn-pronto{background:var(--green);color:#fff;border:none;border-radius:9px;padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
    .btn-pronto:hover{background:#3a6647}

    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--green-dark);color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;z-index:500;transition:transform .3s ease;white-space:nowrap}
    .toast.show{transform:translateX(-50%) translateY(0)}

    .loading-overlay{position:fixed;inset:0;background:rgba(244,247,245,.85);display:none;align-items:center;justify-content:center;z-index:600;flex-direction:column;gap:14px;backdrop-filter:blur(4px)}
    .loading-overlay.show{display:flex}
    .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-overlay p{font-size:14px;color:var(--text3)}
  </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div><p>Carregando...</p></div>

<!-- LOGIN -->
<div class="login-page" id="loginPage">
  <div class="login-wrap">
    <div class="login-logo">use<span>T</span>otem</div>
    <div class="login-sub">Tela da cozinha</div>
    <div class="login-box">
      <h3>Entrar na cozinha</h3>
      <div class="form-group"><label>Usuário</label><input type="text" id="loginUser" autocomplete="off"/></div>
      <div class="form-group"><label>Senha</label><input type="password" id="loginPass" onkeydown="if(event.key==='Enter')doLogin()"/></div>
      <div class="login-error" id="loginError">Usuário ou senha incorretos.</div>
      <button class="btn-primary" onclick="doLogin()">Entrar</button>
    </div>
  </div>
</div>

<!-- KITCHEN -->
<div class="kitchen-page" id="kitchenPage">
  <div class="kitchen-nav">
    <div class="kitchen-nav-left">
      <div class="kitchen-logo">use<span>T</span>otem</div>
      <div class="kitchen-rest" id="kitchenRestName"></div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="status-dot" id="statusDot"></div>
      <div class="status-label" id="statusLabel">Conectado</div>
      <button class="btn-sair" onclick="doLogout()">Sair</button>
    </div>
  </div>
  <div class="kitchen-body" id="kitchenBody">
    <div class="kitchen-empty" id="kitchenEmpty">
      <div class="kitchen-empty-icon">👨‍🍳</div>
      <p>Aguardando pedidos...</p>
    </div>
    <div class="orders-grid" id="ordersGrid" style="display:none"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<audio id="notifSound" preload="auto">
  <source src="data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAA..." type="audio/wav"/>
</audio>

<script>
const SUPABASE_URL='https://tqryqyumqtvoyaxabnad.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRxcnlxeXVtcXR2b3lheGFibmFkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2Mzk3NTYsImV4cCI6MjA5MzIxNTc1Nn0.cZ1Nh-u7IfVtV2oxZDKkor8Lsoqi7jPoYRosiSPfo6Q';

async function sb(path,opts={}){
  const res=await fetch(`${SUPABASE_URL}/rest/v1/${path}`,{
    headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json','Prefer':'return=representation',...opts.headers},
    ...opts
  });
  const text=await res.text();
  return text?JSON.parse(text):[];
}

let restaurante=null;
let pedidos=[];
let pollingInterval=null;
let lastCount=0;

function fmt(v){return'R$ '+parseFloat(v).toFixed(2).replace('.',',')}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2600);
}
function loading(show){document.getElementById('loadingOverlay').classList.toggle('show',show);}

async function doLogin(){
  const user=document.getElementById('loginUser').value.trim();
  const pass=document.getElementById('loginPass').value;
  if(!user||!pass){showToast('Preencha usuário e senha');return;}
  loading(true);
  try{
    const rows=await sb(`restaurantes?usuario_cozinha=eq.${encodeURIComponent(user)}&senha_cozinha=eq.${encodeURIComponent(pass)}&ativo=eq.true&select=*`);
    if(!rows.length){
      document.getElementById('loginError').classList.add('show');
      loading(false);return;
    }
    restaurante=rows[0];
    document.getElementById('loginError').classList.remove('show');
    document.getElementById('kitchenRestName').textContent=restaurante.nome;
    document.getElementById('loginPage').style.display='none';
    document.getElementById('kitchenPage').classList.add('active');
    await loadPedidos();
    startPolling();
  }catch(e){showToast('Erro: '+e.message);}
  loading(false);
}

function doLogout(){
  clearInterval(pollingInterval);
  restaurante=null;pedidos=[];
  document.getElementById('loginPage').style.display='';
  document.getElementById('kitchenPage').classList.remove('active');
  document.getElementById('loginUser').value='';
  document.getElementById('loginPass').value='';
}

async function loadPedidos(){
  try{
    const rows=await sb(`pedidos?restaurante_id=eq.${restaurante.id}&status=eq.pendente&order=criado_em.asc`);
    if(rows.length>lastCount&&lastCount>0) playNotif();
    lastCount=rows.length;
    pedidos=rows;
    renderPedidos();
    document.getElementById('statusDot').style.background='#2ecc71';
    document.getElementById('statusLabel').textContent='Conectado';
  }catch(e){
    document.getElementById('statusDot').style.background='#e74c3c';
    document.getElementById('statusLabel').textContent='Reconectando...';
  }
}

function startPolling(){
  pollingInterval=setInterval(loadPedidos,4000);
}

function playNotif(){
  try{
    const ctx=new AudioContext();
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.frequency.value=880;gain.gain.value=0.3;
    osc.start();osc.stop(ctx.currentTime+0.15);
    setTimeout(()=>{
      const o2=ctx.createOscillator(),g2=ctx.createGain();
      o2.connect(g2);g2.connect(ctx.destination);
      o2.frequency.value=1100;g2.gain.value=0.3;
      o2.start();o2.stop(ctx.currentTime+0.2);
    },180);
  }catch(e){}
}

function renderPedidos(){
  const empty=document.getElementById('kitchenEmpty');
  const grid=document.getElementById('ordersGrid');
  if(!pedidos.length){
    empty.style.display='';grid.style.display='none';return;
  }
  empty.style.display='none';grid.style.display='';
  grid.innerHTML=pedidos.map(p=>{
    const mins=Math.floor((Date.now()-new Date(p.criado_em))/60000);
    const isNovo=mins<2;
    return `<div class="order-card ${isNovo?'novo':''}" id="oc-${p.id}">
      <div class="order-header">
        <div class="order-mesa">Mesa ${p.mesa}</div>
        <div style="display:flex;align-items:center;gap:8px">
          ${isNovo?'<div class="order-badge">NOVO</div>':''}
          <div class="order-time">${mins===0?'agora mesmo':mins+'min atrás'}</div>
        </div>
      </div>
      <div class="order-items">
        ${(p.itens||[]).map(i=>`<div class="order-item-row"><span class="order-qty">${i.qty}×</span><span class="order-item-name">${i.nome}</span><span style="font-size:12px;color:var(--text3)">${fmt(parseFloat(i.preco)*i.qty)}</span></div>`).join('')}
      </div>
      <div class="order-footer">
        <div class="order-total">${fmt(p.total)}</div>
        <button class="btn-pronto" onclick="marcarPronto('${p.id}')">✔ Pronto</button>
      </div>
    </div>`;
  }).join('');
}

async function marcarPronto(id){
  try{
    await sb(`pedidos?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({status:'pronto'})});
    pedidos=pedidos.filter(p=>p.id!==id);
    lastCount=pedidos.length;
    const el=document.getElementById('oc-'+id);
    if(el){el.style.opacity='0';el.style.transform='scale(.95)';el.style.transition='all .3s';setTimeout(()=>renderPedidos(),300);}
    else renderPedidos();
    showToast('Pedido marcado como pronto! ✅');
  }catch(e){showToast('Erro: '+e.message);}
}
</script>
</body>
</html>
